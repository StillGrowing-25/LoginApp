<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">

  <!-- Login Card -->
  <div *ngIf="!isLoggedIn" class="card login-card shadow-sm p-4">
    <h2 class="text-center mb-1">Welcome back</h2>
    <p class="text-center text-muted mb-4">Sign in to your account</p>

    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="alert alert-danger py-2">
      {{ errorMessage }}
    </div>

    <!-- Email Field -->
    <div class="mb-3">
      <label for="email" class="form-label">Email address</label>
      <input
        type="email"
        id="email"
        class="form-control"
        placeholder="you@example.com"
        [(ngModel)]="email"
      />
    </div>

    <!-- Password Field -->
    <div class="mb-4">
      <label for="password" class="form-label">Password</label>
      <input
        type="password"
        id="password"
        class="form-control"
        placeholder="Enter your password"
        [(ngModel)]="password"
      />
    </div>

    <!-- Submit Button -->
    <button class="btn btn-primary w-100" (click)="onLogin()">
      Sign in
    </button>

    <p class="text-center text-muted mt-3 mb-0">
      Don't have an account? <a href="#">Sign up</a>
    </p>
  </div>

  <!-- Success Screen -->
  <div *ngIf="isLoggedIn" class="card login-card shadow-sm p-4 text-center">
    <div class="success-icon mb-3">✓</div>
    <h3>You're logged in!</h3>
    <p class="text-muted">Welcome, {{ email }}</p>
    <button class="btn btn-outline-secondary mt-2" (click)="onLogout()">
      Sign out
    </button>
  </div>

</div>
